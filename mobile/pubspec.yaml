name: reflectscan
description: Retroreflectivity measurement for national highways.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Camera + AI
  camera: ^0.11.0
  tflite_flutter: ^0.11.0
  image: ^4.2.0
  torch_light: ^1.0.0

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Networking
  dio: ^5.7.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
